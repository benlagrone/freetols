name: Build Thumbnail Wizard Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: thumbnail-wizard-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_REF: ghcr.io/benlagrone/freetols:sha-${{ github.sha }}
      LATEST_REF: ghcr.io/benlagrone/freetols:latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: CI=true npm test -- --watchAll=false

      - name: Build Web App
        run: npm run build

      - name: Build Container For Smoke
        run: docker build -t thumbnail-wizard:ci .

      - name: Container Smoke
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --rm --name thumbnail-wizard-smoke -p 127.0.0.1:18082:80 thumbnail-wizard:ci
          trap 'docker rm -f thumbnail-wizard-smoke >/dev/null 2>&1 || true' EXIT

          for url in http://127.0.0.1:18082/ http://127.0.0.1:18082/asset-manifest.json; do
            for attempt in $(seq 1 20); do
              if curl -fsSI "$url" >/dev/null 2>&1; then
                break
              fi
              sleep 2
            done
            curl -fsSI "$url"
          done

      - name: Login To GHCR
        shell: bash
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Tag And Push Image
        shell: bash
        run: |
          set -euo pipefail
          docker tag thumbnail-wizard:ci "$IMAGE_REF"
          docker tag thumbnail-wizard:ci "$LATEST_REF"
          docker push "$IMAGE_REF"
          docker push "$LATEST_REF"

      - name: Write Build Metadata
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PYMETA'
          import json
          import os
          import subprocess

          image_ref = os.environ['IMAGE_REF']
          try:
              digest = subprocess.check_output(
                  ['docker', 'image', 'inspect', image_ref, '--format', '{{index .RepoDigests 0}}'],
                  text=True,
                  stderr=subprocess.DEVNULL,
              ).strip()
          except Exception:
              digest = ''

          with open('build-metadata.json', 'w', encoding='utf-8') as fh:
              json.dump(
                  {
                      'commit_sha': os.environ['GITHUB_SHA'],
                      'image_tag': image_ref,
                      'image_digest': digest,
                  },
                  fh,
                  indent=2,
              )
          PYMETA

      - name: Upload Build Metadata
        uses: actions/upload-artifact@v4
        with:
          name: thumbnail-wizard-build-${{ github.sha }}
          path: build-metadata.json

      - name: Trigger Fortress Deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.FORTRESS_WORKFLOW_TOKEN != ''
        shell: bash
        env:
          FORTRESS_WORKFLOW_TOKEN: ${{ secrets.FORTRESS_WORKFLOW_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${FORTRESS_WORKFLOW_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/benlagrone/fortress-phronesis/actions/workflows/deploy-thumbnail-wizard.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"source_sha\":\"${GITHUB_SHA}\",\"environment\":\"prod\"}}"

      - name: Build Summary
        shell: bash
        run: |
          set -euo pipefail
          DIGEST="$(python3 - <<'PYDIGEST'
          import json
          with open('build-metadata.json', 'r', encoding='utf-8') as fh:
              data = json.load(fh)
          print(data.get('image_digest', ''))
          PYDIGEST
          )"

          {
            echo "## Thumbnail Wizard Build"
            echo ""
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Image tag: \`${IMAGE_REF}\`"
            if [ -n "$DIGEST" ]; then
              echo "- Image digest: \`${DIGEST}\`"
            fi
            if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ] && [ -n "${{ secrets.FORTRESS_WORKFLOW_TOKEN }}" ]; then
              echo "- Deploy: fortress deployment was dispatched automatically for this SHA."
            elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "- Deploy: image publish succeeded; automatic fortress dispatch is skipped until \`FORTRESS_WORKFLOW_TOKEN\` is configured."
            else
              echo "- Deploy: automatic deployment is only triggered for pushes to \`main\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
