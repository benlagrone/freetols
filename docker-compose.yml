services:
  thumbnail-wizard:
    container_name: thumbnail-wizard
    build:
      context: .
      dockerfile: Dockerfile
    image: thumbnail-wizard:latest
    ports:
      - "${APP_PORT:-8080}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/asset-manifest.json >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
